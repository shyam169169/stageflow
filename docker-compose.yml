version: "3.9"

services:

  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  api:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app #enables live reload
    command: > 
      uvicorn stageflow.api.app:app
      --host 0.0.0.0
      --port 8000
      --reload

volumes:
  postgres_data: